version: '3.8'
services:
  mongodb:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/rebar_optima
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=change-this-to-a-very-secure-secret-key
      - JWT_REFRESH_SECRET=change-this-to-another-very-secure-secret-key
    depends_on:
      - mongodb
      - redis

volumes:
  mongodata:

